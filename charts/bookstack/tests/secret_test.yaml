suite: secret credentials + appKey
templates:
  - templates/secret.yaml
release:
  name: bookstack
tests:
  - it: embedded mariadb is the source of truth for db creds
    set:
      mariadb.enabled: true
      mariadb.auth.username: bs_user
      mariadb.auth.password: Sup3rSecret
      mariadb.auth.database: bs_db
    asserts:
      - equal: { path: stringData.DB_USERNAME, value: bs_user }
      - equal: { path: stringData.DB_PASSWORD, value: Sup3rSecret }
  - it: external db falls back to config.* creds
    set:
      mariadb.enabled: false
      config.dbUser: ext_u
      config.dbPass: ext_p
    asserts:
      - equal: { path: stringData.DB_USERNAME, value: ext_u }
      - equal: { path: stringData.DB_PASSWORD, value: ext_p }
  - it: pinned config.appKey wins
    set:
      config.appKey: "base64:PINNEDKEYVALUE=="
    asserts:
      - equal: { path: stringData.APP_KEY, value: "base64:PINNEDKEYVALUE==" }
  - it: empty appKey auto-generates a base64-prefixed key
    set:
      config.appKey: ""
    asserts:
      - matchRegex: { path: stringData.APP_KEY, pattern: "^base64:" }
  - it: existingSecret skips the chart-managed Secret
    set:
      existingSecret: my-secret
    asserts:
      - hasDocuments: { count: 0 }
