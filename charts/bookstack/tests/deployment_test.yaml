suite: deployment wiring
templates:
  - templates/deployment.yaml
release:
  name: rel
tests:
  - it: uses the lscr.io image ref
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^lscr\\.io/linuxserver/bookstack:"
  - it: envFrom targets the chart-managed Secret by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: rel-bookstack
  - it: envFrom targets existingSecret when set
    set:
      existingSecret: my-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: my-secret
  - it: renders linuxserver PUID/PGID/UMASK/TZ env
    asserts:
      - contains: { path: "spec.template.spec.containers[0].env", content: { name: PUID, value: "1000" } }
      - contains: { path: "spec.template.spec.containers[0].env", content: { name: TZ, value: "Etc/UTC" } }
  - it: DB_DATABASE derives from mariadb.auth.database when embedded
    set:
      mariadb.enabled: true
      mariadb.auth.database: bs_db
    asserts:
      - contains: { path: "spec.template.spec.containers[0].env", content: { name: DB_DATABASE, value: "bs_db" } }
  - it: external dbHost wires directly into the DB_HOST env (embedded mariadb disabled)
    set:
      mariadb.enabled: false
      config.dbHost: mariadb.example.svc.cluster.local
    asserts:
      - contains: { path: "spec.template.spec.containers[0].env", content: { name: DB_HOST, value: "mariadb.example.svc.cluster.local" } }
  - it: DB_HOST falls back to the release-derived mariadb host when config.dbHost is unset
    release:
      name: rel
      namespace: rel-ns
    asserts:
      - contains: { path: "spec.template.spec.containers[0].env", content: { name: DB_HOST, value: "rel-mariadb.rel-ns.svc.cluster.local" } }
  - it: omits linuxserver env when linuxserver.enabled is false
    set:
      linuxserver.enabled: false
    asserts:
      - notContains: { path: "spec.template.spec.containers[0].env", content: { name: PUID, value: "1000" } }
      - notContains: { path: "spec.template.spec.containers[0].env", content: { name: TZ, value: "Etc/UTC" } }
