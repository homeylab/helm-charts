{{- if not .Values.existingSecret -}}
{{- if and .Values.mariadb.enabled (not (include "bookstack.dbPassword" .)) -}}
{{- fail "mariadb.enabled is true but the derived DB password is empty. This happens when mariadb.auth.password is cleared or mariadb.auth.existingSecret is set (the embedded MariaDB then uses a password BookStack cannot read). Set mariadb.auth.password, OR set mariadb.auth.existingSecret together with a bookstack-side existingSecret." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bookstack.fullname" . }}
  labels:
    {{- include "bookstack.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USERNAME: {{ include "bookstack.dbUser" . | quote }}
  DB_PASSWORD: {{ include "bookstack.dbPassword" . | quote }}
  APP_KEY: {{ include "bookstack.appKey" . | quote }}
{{- end }}
