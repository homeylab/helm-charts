apiVersion: v2
name: bookstack
description: bookstack documentation platform

# A chart can be either an 'application' or a 'library' chart.
#
# Application charts are a collection of templates that can be packaged into versioned archives
# to be deployed.
#
# Library charts provide useful utilities or functions for the chart developer. They're included as
# a dependency of application charts to inject those utilities and functions into the rendering
# pipeline. Library charts do not define any templates and therefore cannot be deployed.
type: application

icon: https://raw.githubusercontent.com/BookStackApp/BookStack/development/public/icon.png
home: https://www.bookstackapp.com/
sources:
  - https://github.com/BookStackApp/BookStack
  - https://github.com/linuxserver/docker-bookstack
  - https://github.com/homeylab/helm-charts
keywords:
  - bookstack
  - wiki
  - documentation
  - knowledge-base
maintainers:
  - name: homeylab
    url: https://github.com/homeylab

# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 5.2.0

# This is the version number of the application being deployed. This version number should be
# incremented each time you make changes to the application. Versions are not expected to
# follow Semantic Versioning. They should reflect the version the application is using.
# It is recommended to use it with quotes.
# renovate: datasource=docker depName=linuxserver/bookstack versioning=regex:^version-v(?<major>\d+)\.(?<minor>\d+)(\.(?<patch>\d+))?$
appVersion: "version-v26.05.2"

# Minimum supported Kubernetes version. The -0 suffix matches managed distros'
# prerelease-style versions (e.g. v1.28.3-gke.x).
# 1.21, not the fleet's 1.19: this chart's own manifests are 1.19-clean, but the
# bookstack-file-exporter subchart renders a batch/v1 CronJob (GA in 1.21) and
# Helm does not enforce a subchart's own kubeVersion — so the floor has to cover
# every path this chart can enable, not just the default one.
kubeVersion: ">=1.21.0-0"

dependencies:
- name: mariadb
  version: "0.16.5"
  condition: mariadb.enabled
  repository: "oci://registry-1.docker.io/cloudpirates"
- name: bookstack-file-exporter
  version: "1.0.2"
  condition: bookstack-file-exporter.enabled
  repository: "oci://registry-1.docker.io/homeylabcharts"

annotations:
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/homeylab/helm-charts/tree/main/charts/bookstack
  artifacthub.io/changes: |
    - kind: added
      description: "tests.enabled to toggle the helm test connection-check Pod"
    - kind: added
      description: "podLabels for the Deployment pod template"
    - kind: changed
      description: "harmonized persistence.storageClass to the \"-\" sentinel (disables dynamic provisioning); default behavior unchanged, an unset storageClass still omits storageClassName entirely"
    - kind: changed
      description: "re-pinned the bookstack-file-exporter subchart dependency from 1.0.0 to 1.0.2"
    - kind: added
      description: "unit test coverage for HTTPRoute, the helm test connection-check Pod, and PVC storageClass rendering"
