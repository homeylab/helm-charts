# Default values for bookstack.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## @section Image
image:
  # -- image registry
  registry: lscr.io
  # -- image repository
  repository: linuxserver/bookstack
  # -- image pull policy
  pullPolicy: IfNotPresent
  # You can optionally specify your preferred image tag here.
  # For OS updates but consistent Bookstack version, use `version-X.X.X` tag
  # for other variants refer: https://www.linuxserver.io/blog/docker-tags-so-many-tags-so-little-time#manifests
  # -- overrides the image tag whose default is the chart appVersion
  tag: ""

## @section Testing
## post-install `helm test` connection check
tests:
  image:
    # -- registry for the `helm test` connection-check image
    registry: docker.io
    # -- repository for the `helm test` connection-check image
    repository: busybox
    # -- tag for the `helm test` connection-check image
    tag: "1.36.1"
    # -- pull policy for the `helm test` connection-check image
    pullPolicy: IfNotPresent
  ## path the test requests and expects a 200 from
  # -- path the `helm test` request calls and expects a 200 from
  path: /status

## @section Resources & Deployment behavior
updateStrategy:
  # -- deployment update strategy, e.g. `Recreate` or `RollingUpdate`
  type: Recreate

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

## Pod-level security context.
## NOTE: the default linuxserver.io image boots as root (s6-overlay init chowns
## /config and drops to PUID:PGID), so runAsNonRoot / readOnlyRootFilesystem /
## dropping capabilities will BREAK it. PUID/PGID (see linuxserver.*) is the
## unprivileged UID the app actually runs as. A safe baseline that works with
## linuxserver:
##   seccompProfile:
##     type: RuntimeDefault
podSecurityContext: {}

## Container-level security context.
## Real hardening (runAsNonRoot, runAsUser, readOnlyRootFilesystem, drop-all
## capabilities) is only viable on a rootless image with linuxserver.enabled=false
## — do NOT enable these while using the default linuxserver image. Example for a
## rootless image:
##   runAsNonRoot: true
##   runAsUser: 1000
##   readOnlyRootFilesystem: true
##   allowPrivilegeEscalation: false
##   capabilities:
##     drop: [ALL]
securityContext: {}

## @section Credentials & Secret
## existing secret for credentials
## if supplied, dbUser and dbPass will be ignored in config section
## You can also optionally set more credentials/secret env vars in this secret like APP_KEY
## The following should be used in existingSecret if specified:
## - DB_USERNAME (replaces dbUser below if specified)
## - DB_PASSWORD (replaces dbPass below if specified)
## - APP_KEY (replaces appKey below if specified)
# -- name of an existing Secret with `DB_USERNAME`/`DB_PASSWORD`/`APP_KEY` keys; if set, `config.dbUser`/`config.dbPass`/`config.appKey` are ignored
existingSecret: ""

## @section LinuxServer.io Runtime
## linuxserver.io image runtime settings (PUID/PGID/UMASK/TZ)
## https://docs.linuxserver.io/images/docker-bookstack/
linuxserver:
  # -- Render linuxserver.io/s6 runtime env (PUID/PGID/UMASK/TZ). Set false if you swap to a non-linuxserver BookStack image.
  enabled: true
  # -- user ID the container process runs as
  PUID: 1000
  # -- group ID the container process runs as
  PGID: 1000
  # -- file creation mask applied inside the container
  UMASK: "022"
  # -- timezone for the container
  TZ: "Etc/UTC"

## @section Application config
## Default values below will work with included mariadb chart in bookstack namespace
config:
  ## (specify http/https) url used to access bookstack
  ## If using ingress, set it to same url
  ## example: "https://bookstack.yourdomain.org"
  # -- public url (with http/https) used to access bookstack; should match your ingress/httproute host
  appUrl: ""
  ## Session encryption key. Leave empty to auto-generate (stored in the chart Secret and
  ## preserved across upgrades). To pin one: `docker run -it --rm --entrypoint /bin/bash \
  ##   lscr.io/linuxserver/bookstack:latest appkey`
  ## Ignored if existingSecret is specified.
  # -- app encryption key; leave empty to auto-generate and persist in the chart Secret, or pin an existing key (required when upgrading with existing data, see "Migrating to 5.0.0")
  appKey: ""
  ## dbHost should be specified and consistent.
  ## If left empty, it is derived as "{{ .Release.Name }}-mariadb.{{ .Release.Namespace }}.svc.cluster.local"
  ## to target the embedded CloudPirates mariadb. This matches the subchart Service for any release name
  ## unless the release name contains "mariadb" or mariadb.fullnameOverride/nameOverride is set — set dbHost
  ## explicitly in those cases. Example: "bookstack-mariadb.bookstack.svc.cluster.local"
  # -- backend db host; if empty, derived to target the embedded CloudPirates mariadb (see comment above for caveats)
  dbHost: ""
  # -- backend db port
  dbPort: 3306
  # -- database name to connect to
  dbDatabase: bookstack
  ## Credentials below
  ## if existingSecret is specified, these will be ignored
  # -- db username; ignored if `existingSecret` is set, or if `mariadb.enabled` is true (embedded mariadb is the source of truth then)
  dbUser: bookstack
  # -- db password; ignored if `existingSecret` is set, or if `mariadb.enabled` is true (embedded mariadb is the source of truth then)
  dbPass: bookstack
  ## Cache & Session driver to use
  ## Can be 'file', 'database', 'memcached' or 'redis'
  # -- cache driver: `file`, `database`, `memcached` or `redis`
  cacheDriver: database
  # -- session driver: `file`, `database`, `memcached` or `redis`
  sessionDriver: database


## Below options are used as env variables, choose any valid one Bookstack supports
## Ref: https://github.com/BookStackApp/BookStack/blob/development/.env.example.complete
## All keys will be upper cased and values will be quoted
## Some default values below for reference
## linuxserver.io specific env variables can also be set below
extraEnv: {}
  # TZ: Etc/UTC
  # APP_DEFAULT_DARK_MODE: true
  # APP_VIEWS_BOOKS: list

## @section Routing
service:
  # -- Kubernetes Service type
  type: ClusterIP
  # -- Service port
  port: 80
  # -- name of the Service port (NOT the Service name)
  portName: http

ingress:
  # -- enable an Ingress (networking.k8s.io/v1) for the bookstack Service
  enabled: false
  # -- ingress class name
  className: ""
  ## Add controller-specific annotations here, e.g. for nginx:
  ##   nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  # -- annotations added to the Ingress; empty by default (previously shipped nginx timeout annotations — see "Migrating to 5.0.0")
  annotations: {}
  # -- ingress hosts and paths
  hosts:
    - host: bookstack.example.org
      paths:
        - path: /
          pathType: Prefix
  # -- ingress TLS configuration
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

## Gateway API HTTPRoute (alternative to ingress).
## Requires the Gateway API CRDs installed and an existing Gateway to attach to
## (this chart does NOT create the Gateway). For cross-namespace attachment,
## the target Gateway listener must allow routes from this namespace (or add a
## ReferenceGrant).
httproute:
  # -- enable a Gateway API (gateway.networking.k8s.io/v1) HTTPRoute as an alternative to ingress
  enabled: false
  # -- annotations added to the HTTPRoute
  annotations: {}
  ## Gateways to attach to (parentRefs). name is required; namespace/sectionName optional.
  # -- parentRefs pointing at the Gateway(s) to attach to; `name` is required
  parentRefs: []
  #  - name: traefik-gateway
  #    namespace: traefik
  #    sectionName: websecure
  # -- hostnames matched by the route
  hostnames: []
  #  - bookstack.example.org
  ## Optional explicit rules. If empty, a single rule routing all paths to the
  ## bookstack service is generated.
  # -- explicit HTTPRoute rules; if empty, a single rule routing all paths to the bookstack Service is generated
  rules: []

## @section Persistence
persistence:
  # -- enable a PVC for bookstack application data
  enabled: true
  # -- storage class for the PVC; empty uses the cluster default
  storageClass: ""
  # -- size of the PVC
  size: 5Gi
  ## NOTE: When existingClaim is set the rest of persistence parameters are ignored
  # -- use an existing PVC instead of creating one; if set, the rest of the persistence options are ignored
  existingClaim: ""
  # -- PVC access modes
  accessModes:
    - ReadWriteOnce

# -- container resource requests/limits; left empty by default, see comments below for an example
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

## Ref: https://github.com/BookStackApp/BookStack/commit/6eda1c1fb28142d432bf0ca05d7eaba9bf16f0d0#diff-5782232ec3249cb816fc3f3332f8322e351f91d9cc590d717ab9e446536a1949
## Use `/status` path for checks

## Liveness probe
# -- liveness probe config; set to `{}` to disable
livenessProbe:
  httpGet:
    path: /status
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 5
  successThreshold: 1

## Readiness probe
# -- readiness probe config; set to `{}` to disable
readinessProbe:
  httpGet:
    path: /status
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 5
  successThreshold: 1

## Startup Probe
## Initial delay of 30 seconds to wait for mariadb
## long start up helps with chart-testing, change this as desired
## shorter periodSeconds helps with pod restarts for db timeout conditions
# -- startup probe config; set to `{}` to disable
startupProbe:
  httpGet:
    path: /status
    port: http
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

nodeSelector: {}

tolerations: []

affinity: {}

## @section Database (embedded MariaDB)
## mariadb backend (embedded)
## https://github.com/CloudPirates-io/helm-charts/tree/main/charts/mariadb
## Set mariadb.enabled=false and config.dbHost to use an external database.
mariadb:
  # -- deploy the embedded CloudPirates mariadb subchart; set to `false` to use an external database via `config.dbHost`
  enabled: true
  auth:
    ## Root password. Ignored if existingSecret is set.
    # -- mariadb root password; ignored if `auth.existingSecret` is set
    rootPassword: ""
    ## Application database + user created on first boot.
    # -- application database created on first boot; single source of truth for bookstack's `config.dbDatabase` when `mariadb.enabled` is true
    database: "bookstack"
    # -- application db username created on first boot; single source of truth for bookstack's `config.dbUser` when `mariadb.enabled` is true
    username: "bookstack"
    # -- application db password created on first boot; single source of truth for bookstack's `config.dbPass` when `mariadb.enabled` is true
    password: "bookstack"
    ## Existing secret with keys: mariadb-root-password, mariadb-password
    # -- existing Secret with `mariadb-root-password`/`mariadb-password` keys; if set, also set the bookstack-side `existingSecret` (see "Migrating to 5.0.0")
    existingSecret: ""
  persistence:
    # -- enable a PVC for the embedded mariadb data volume
    enabled: true
    # -- use an existing PVC instead of creating one
    existingClaim: ""
    # -- storage class for the mariadb PVC; empty uses the cluster default
    storageClass: ""
    # -- mariadb PVC access modes
    accessModes:
      - ReadWriteOnce
    # -- size of the mariadb PVC
    size: 8Gi

bookstack-file-exporter:
  enabled: false
  config:
    # -- set the bookstack instance URL
    host: "http://bookstack.bookstack.svc.cluster.local"
    credentials:
      # -- set token id, ignored if `BOOKSTACK_TOKEN_ID` is defined in `existingSecret` or env variable
      tokenId: ""
      # -- set token secret, ignored if `BOOKSTACK_TOKEN_SECRET` is defined in `existingSecret` or env variable
      tokenSecret: ""
    # -- set any additional headers for http client
    additionalHeaders:
      User-Agent: "bookstack-file-exporter"
    # -- set one or more export formats
    formats:
      - markdown
      # - html
      # - pdf
      # - plaintext
    minio:
      enabled: false
      # set minio 
      host: "minio.yourdomain.com"
      # -- set minio access key, ignored if `MINIO_ACCESS_KEY` is defined in `existingSecret` or env variable
      accessKey: ""
      # -- set minio secret key, ignored if `MINIO_SECRET_KEY` is defined in `existingSecret` or env variable
      secretKey: ""
      # -- set region
      region: "us-east-1"
      # -- set bucket
      bucket: "bookstack-bkps"
      # -- set minio path to use
      path: "bookstack/file_backups/"
      # -- how many backups to keep
      keepLast: 5
    assets:
      # -- set to export images
      exportImages: true
      # -- set to export attachments
      exportAttachments: true
      # -- set to modify asset links for markdown files
      modifyMarkdown: false
      # -- set to export page metadata
      exportMeta: false
      # -- set to enable SSL verification for all asset requests
      verifySSL: true
    # -- how many backups to keep on filesystem
    keepLast: 1
    # -- If `runInterval` is > `0`, the exporter will run as a deployment and wait specified seconds between runs.
    # -- setting to `0` uses CronJob resource instead of a deployment
    runInterval: 0

  cron:
    # -- if `runInterval == 0` CronJob settings will be applied
    # -- set a valid cron schedule
    schedule: "@daily"
    # -- set a valid timezone if preferred
    timeZone: ""
    # -- set the concurrency policy
    concurrencyPolicy: Forbid
    # -- set restart policy
    restartPolicy: OnFailure
  
  persistence:
    # -- enable persistence using PVC for backup files if using `runMode: application`
    enabled: false
    # -- set additional annotations for the PVC
    annotations: {}
    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    ##
    # -- set the storage class to use, example: `nfs-provisioner`
    storageClass: ""
    # -- set the size of the volume
    size: 5Gi
    # -- set an existingClaim for volume, if set the rest of persistence parameters are ignored
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    # probably will not have to change below
    # -- set the mount path for the volume inside the container
    mountPath: "/export/dump"
    # Selector to match an existing Persistent Volume
    selector: {}
