apiVersion: v2
name: qbittorrent-exporter
description: A Helm chart to export Prometheus metrics for qbittorrent.
type: application

home: https://github.com/martabal/qbittorrent-exporter
sources:
  - https://github.com/martabal/qbittorrent-exporter
  - https://github.com/homeylab/helm-charts
keywords:
  - qbittorrent
  - torrent
  - prometheus
  - exporter
  - metrics
maintainers:
  - name: homeylab
    url: https://github.com/homeylab

# This is the chart version. SemVer: https://semver.org/
version: 1.0.0

# Application version (upstream image tag). Not SemVer-bound.
# renovate: datasource=docker depName=ghcr.io/martabal/qbittorrent-exporter
appVersion: "v2.0.1"

annotations:
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/homeylab/helm-charts/tree/main/charts/qbittorrent-exporter
  artifacthub.io/changes: |
    - kind: changed
      description: "BREAKING - backing exporter swapped to martabal/qbittorrent-exporter (ghcr.io/martabal/qbittorrent-exporter, Go, the unmaintained caseyscarborough image is replaced); metric names/labels and the values schema change accordingly"
    - kind: changed
      description: "POTENTIALLY BREAKING - hardened securityContext defaults now apply (runAsNonRoot, runAsUser 65534, readOnlyRootFilesystem, drop ALL)"
    - kind: changed
      description: "credentials render into a chart-managed Secret and wire via envFrom (keys QBITTORRENT_USERNAME/QBITTORRENT_PASSWORD/QBITTORRENT_API_KEY); existingSecret supported"
    - kind: changed
      description: "BREAKING - values schema: config.host/port/ssl/urlBase/verifyCert replaced by config.baseUrl/timeout/fullRefreshInterval/insecureSkipVerify/minTlsVersion/logLevel, plus a new settings.features block (enableTracker/enableHighCardinality/enableIncreasedCardinality/enableLabelWithTracker/enableLabelWithHash/enableLabelWithTags); auth.user/pass/apiKey unchanged"
    - kind: added
      description: "optional ingress (networking.k8s.io/v1) and Gateway API HTTPRoute (httproute.enabled); TCP liveness/readiness probes"
