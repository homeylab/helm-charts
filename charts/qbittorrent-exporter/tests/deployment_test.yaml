suite: qbittorrent-exporter deployment wiring
templates:
  - templates/deployment.yaml
release:
  name: qbittorrent-exporter
tests:
  - it: never renders a plaintext QBITTORRENT_PASSWORD env
    set:
      settings.auth.user: admin
      settings.auth.pass: s3cret-pw
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content: { name: QBITTORRENT_PASSWORD, value: s3cret-pw }
  - it: envFrom targets the chart-managed Secret when creds are set
    set:
      settings.auth.user: admin
      settings.auth.pass: s3cret-pw
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: qbittorrent-exporter
  - it: envFrom targets existingSecret when set
    set:
      settings.auth.existingSecret: my-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: my-secret
  - it: envFrom set when only apiKey provided
    set:
      settings.auth.apiKey: k-123
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: qbittorrent-exporter
  - it: omits envFrom entirely when no creds and no existingSecret
    set:
      settings.auth.user: ""
      settings.auth.pass: ""
      settings.auth.apiKey: ""
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].envFrom
  - it: renders the container image as registry/repository:tag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/martabal/qbittorrent-exporter:v2.0.1
  - it: sets EXPORTER_PORT and QBITTORRENT_BASE_URL env
    set:
      settings.config.baseUrl: https://qb.local:443
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: EXPORTER_PORT, value: "8090" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: QBITTORRENT_BASE_URL, value: https://qb.local:443 }
  - it: renders lowercase booleans (martabal compares strings.ToLower(env) == "true")
    set:
      settings.config.insecureSkipVerify: true
      settings.features.enableHighCardinality: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: INSECURE_SKIP_VERIFY, value: "true" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: ENABLE_HIGH_CARDINALITY, value: "true" }
  - it: defaults render INSECURE_SKIP_VERIFY false, LOG_LEVEL INFO, ENABLE_TRACKER true, other flags false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: INSECURE_SKIP_VERIFY, value: "false" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: LOG_LEVEL, value: "INFO" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: ENABLE_TRACKER, value: "true" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: ENABLE_INCREASED_CARDINALITY, value: "false" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: ENABLE_LABEL_WITH_TAGS, value: "false" }
  - it: applies hardened pod and container securityContext defaults
    asserts:
      - equal: { path: "spec.template.spec.securityContext.runAsNonRoot", value: true }
      - equal: { path: "spec.template.spec.securityContext.runAsUser", value: 65534 }
      - equal: { path: "spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem", value: true }
      - contains:
          path: "spec.template.spec.containers[0].securityContext.capabilities.drop"
          content: ALL
  - it: does not mount a /tmp emptyDir (JVM artifact removed)
    set:
      settings.auth.user: admin
      settings.auth.pass: pw
    asserts:
      - notExists:
          path: spec.template.spec.volumes
