suite: qbittorrent-exporter credential Secret
templates:
  - templates/secret.yaml
release:
  name: qbittorrent-exporter
tests:
  - it: renders both keys from auth.username and auth.password
    set:
      settings.auth.username: admin
      settings.auth.password: s3cret-pw
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: stringData.QBITTORRENT_USERNAME, value: admin }
      - equal: { path: stringData.QBITTORRENT_PASSWORD, value: s3cret-pw }
      - equal: { path: metadata.name, value: qbittorrent-exporter }
  - it: renders only the provided key
    set:
      settings.auth.password: s3cret-pw
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: stringData.QBITTORRENT_PASSWORD, value: s3cret-pw }
      - notExists: { path: stringData.QBITTORRENT_USERNAME }
  - it: existingSecret skips the chart-managed Secret
    set:
      settings.auth.username: admin
      settings.auth.password: s3cret-pw
      settings.auth.existingSecret: my-secret
    asserts:
      - hasDocuments: { count: 0 }
  - it: no creds and no existingSecret renders no Secret (no fail)
    set:
      settings.auth.username: ""
      settings.auth.password: ""
    asserts:
      - hasDocuments: { count: 0 }
