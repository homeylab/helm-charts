suite: qbittorrent-exporter credential Secret
templates:
  - templates/secret.yaml
release:
  name: qbittorrent-exporter
tests:
  - it: renders user and pass keys
    set:
      settings.auth.user: admin
      settings.auth.pass: s3cret-pw
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: stringData.QBITTORRENT_USER, value: admin }
      - equal: { path: stringData.QBITTORRENT_PASS, value: s3cret-pw }
      - equal: { path: metadata.name, value: qbittorrent-exporter }
  - it: renders apiKey when set, no user key
    set:
      settings.auth.apiKey: k-123
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: stringData.QBITTORRENT_API_KEY, value: k-123 }
      - notExists: { path: stringData.QBITTORRENT_USER }
  - it: existingSecret skips the chart-managed Secret
    set:
      settings.auth.user: admin
      settings.auth.pass: s3cret-pw
      settings.auth.existingSecret: my-secret
    asserts:
      - hasDocuments: { count: 0 }
  - it: no creds and no existingSecret renders no Secret
    set:
      settings.auth.user: ""
      settings.auth.pass: ""
      settings.auth.apiKey: ""
    asserts:
      - hasDocuments: { count: 0 }
