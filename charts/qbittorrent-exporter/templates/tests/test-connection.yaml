apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "qbittorrent-exporter.fullname" . }}-test-connection"
  labels:
    {{- include "qbittorrent-exporter.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: "{{ .Values.testConnImage.registry }}/{{ .Values.testConnImage.repository }}:{{ .Values.testConnImage.tag }}"
      command: ['wget']
      args: ['{{ include "qbittorrent-exporter.fullname" . }}:{{ .Values.service.port }}{{ .Values.testConnImage.path }}']
  restartPolicy: Never
