{{- if not .Values.settings.auth.existingSecret -}}
{{- if or .Values.settings.auth.user .Values.settings.auth.pass .Values.settings.auth.apiKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qbittorrent-exporter.fullname" . }}
  labels:
    {{- include "qbittorrent-exporter.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.settings.auth.user }}
  QBITTORRENT_USERNAME: {{ . | quote }}
  {{- end }}
  {{- with .Values.settings.auth.pass }}
  QBITTORRENT_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.settings.auth.apiKey }}
  QBITTORRENT_API_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
{{- end }}
