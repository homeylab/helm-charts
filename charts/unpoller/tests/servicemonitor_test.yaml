suite: unpoller ServiceMonitor
templates:
  - templates/servicemonitor.yaml
release:
  name: rel
tests:
  - it: does not render when metrics are disabled
    set:
      metrics.enabled: false
      metrics.serviceMonitor.enabled: true
    asserts:
      - hasDocuments: { count: 0 }
  - it: does not render when serviceMonitor is disabled
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: false
    asserts:
      - hasDocuments: { count: 0 }
  - it: renders with scrape config from values when enabled
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: apiVersion, value: monitoring.coreos.com/v1 }
      - equal: { path: kind, value: ServiceMonitor }
      - equal: { path: metadata.name, value: rel-unpoller }
      - equal: { path: "spec.endpoints[0].interval", value: 30s }
      - equal: { path: "spec.endpoints[0].path", value: /metrics }
      - equal: { path: "spec.endpoints[0].port", value: metrics }
      - equal: { path: "spec.endpoints[0].scrapeTimeout", value: 10s }
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: unpoller
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: rel
  - it: scopes the namespaceSelector to the release namespace
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    release:
      namespace: monitoring
    asserts:
      - contains: { path: spec.namespaceSelector.matchNames, content: monitoring }
  - it: reads interval, scrapeTimeout and port from values rather than hardcoding the defaults
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.interval: 45s
      metrics.serviceMonitor.scrapeTimeout: 9s
      service.name: http-metrics
    asserts:
      - equal: { path: "spec.endpoints[0].interval", value: 45s }
      - equal: { path: "spec.endpoints[0].scrapeTimeout", value: 9s }
      # the endpoint port is plumbed from service.name, not a serviceMonitor key;
      # renaming the service port must follow through here or scraping silently breaks
      - equal: { path: "spec.endpoints[0].port", value: http-metrics }
  - it: omits optional relabeling and targetLabels blocks by default
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    asserts:
      - notExists: { path: "spec.endpoints[0].relabelings" }
      - notExists: { path: "spec.endpoints[0].metricRelabelings" }
      - notExists: { path: spec.targetLabels }
  - it: renders relabelings, metricRelabelings and targetLabels when set
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
      metrics.serviceMonitor.metricRelabelings:
        - action: drop
          regex: go_.*
          sourceLabels: [__name__]
      metrics.serviceMonitor.targetLabels:
        - app.kubernetes.io/instance
    asserts:
      - equal: { path: "spec.endpoints[0].relabelings[0].targetLabel", value: node }
      - equal: { path: "spec.endpoints[0].metricRelabelings[0].action", value: drop }
      - contains:
          path: spec.targetLabels
          content: app.kubernetes.io/instance
  - it: merges additionalLabels into metadata labels
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.additionalLabels:
        release: kube-prometheus-stack
    asserts:
      - equal:
          path: metadata.labels.release
          value: kube-prometheus-stack
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: unpoller
