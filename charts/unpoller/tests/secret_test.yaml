suite: unpoller credential Secret
templates:
  - templates/secret.yaml
release:
  name: unpoller
tests:
  - it: renders unifi user/pass when set and no existingSecret
    set:
      settings.unifi.auth.user: admin
      settings.unifi.auth.pass: s3cret-pass
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: stringData.UP_UNIFI_CONTROLLER_0_USER, value: admin }
      - equal: { path: stringData.UP_UNIFI_CONTROLLER_0_PASS, value: s3cret-pass }
      - equal: { path: metadata.name, value: unpoller }
  - it: does not render when existingSecret is set, even if unifi auth is also set
    set:
      settings.unifi.auth.user: admin
      settings.unifi.auth.pass: s3cret-pass
      existingSecret: my-secret
    asserts:
      - hasDocuments: { count: 0 }
  - it: does not render when all auth is empty and no existingSecret
    set:
      settings.unifi.auth.user: ""
      settings.unifi.auth.pass: ""
    asserts:
      - hasDocuments: { count: 0 }
  - it: includes influxdb keys when influxdb is enabled and auth is set
    set:
      settings.unifi.auth.user: admin
      settings.unifi.auth.pass: s3cret-pass
      settings.influxdb.enabled: true
      settings.influxdb.auth.user: influx-user
      settings.influxdb.auth.pass: influx-pass
      settings.influxdb.auth.auth_token: influx-token
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: stringData.UP_INFLUXDB_USER, value: influx-user }
      - equal: { path: stringData.UP_INFLUXDB_PASS, value: influx-pass }
      - equal: { path: stringData.UP_INFLUXDB_AUTH_TOKEN, value: influx-token }
  - it: omits UP_INFLUXDB_AUTH_TOKEN when auth_token is empty
    set:
      settings.unifi.auth.user: admin
      settings.unifi.auth.pass: s3cret-pass
      settings.influxdb.enabled: true
      settings.influxdb.auth.user: influx-user
      settings.influxdb.auth.pass: influx-pass
      settings.influxdb.auth.auth_token: ""
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: stringData.UP_INFLUXDB_USER, value: influx-user }
      - notExists: { path: stringData.UP_INFLUXDB_AUTH_TOKEN }
  - it: omits influxdb keys entirely when influxdb is disabled
    set:
      settings.unifi.auth.user: admin
      settings.unifi.auth.pass: s3cret-pass
      settings.influxdb.enabled: false
      settings.influxdb.auth.user: influx-user
      settings.influxdb.auth.pass: influx-pass
    asserts:
      - hasDocuments: { count: 1 }
      - notExists: { path: stringData.UP_INFLUXDB_USER }
      - notExists: { path: stringData.UP_INFLUXDB_PASS }
