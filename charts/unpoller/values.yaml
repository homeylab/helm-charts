# Default values for unifi-unpoller.
# -- number of replicas for the deployment
replicaCount: 1

## From: https://github.com/unpoller/unpoller/pkgs/container/unpoller
image:
  # -- image registry
  registry: ghcr.io
  # -- image repository
  repository: unpoller/unpoller
  # -- image pull policy
  pullPolicy: IfNotPresent
  # -- overrides the image tag whose default is the chart appVersion
  tag: ""

## images for the `helm test` connection check
tests:
  image:
    # -- registry for the `helm test` connection-check image
    registry: docker.io
    # -- repository for the `helm test` connection-check image
    repository: busybox
    # -- tag for the `helm test` connection-check image
    tag: "1.36.1"
    # -- pull policy for the `helm test` connection-check image
    pullPolicy: IfNotPresent
  # -- path for the post-install connection check
  path: /health

updateStrategy:
  # -- set the update strategy for the deployment
  type: Recreate

# -- image pull secrets for the deployment
imagePullSecrets: []
# -- override the chart name
nameOverride: ""
# -- override the full release name
fullnameOverride: ""

# -- extra pod annotations
podAnnotations: {}

service:
  # -- set the service type
  type: ClusterIP
  # -- set port for unpoller scraping (unpoller default 9130)
  port: 9130
  # -- set protocol for the service
  protocol: TCP
  # -- set name for the service port (referenced by probes and serviceMonitor)
  name: metrics

## Use prometheus service monitor instead for Prom operator
metrics:
  # -- enable/disable prometheus podAnnotations and serviceMonitor
  enabled: true
  # -- Add podAnnotations for prometheus scraping
  podAnnotations:
    prometheus.io/scrape: "true"
    # -- set the path for prometheus scraping
    prometheus.io/path: /metrics
    # -- set the port for prometheus scraping, should match the service port
    prometheus.io/port: "9130"
  ## if serviceMonitor enabled, pod annotations will be ignored
  serviceMonitor:
    # -- enable/disable serviceMonitor, if enabled podAnnotations will be ignored
    enabled: false
    # -- how often to scrape for serviceMonitor
    interval: 30s
    # -- scrapeTimeout for serviceMonitor
    scrapeTimeout: 10s
    # -- set additional labels for serviceMonitor
    additionalLabels: {}
    # -- set targetLabels for serviceMonitor
    targetLabels: []
    # ref: https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/api.md#endpoint
    # -- set relabelings for serviceMonitor
    relabelings: []
    # -- set metricRelabelings for serviceMonitor
    metricRelabelings: []
  ## Enable and configure Prometheus Rules for the chart under this key.
  prometheusRule:
    # -- enable a PrometheusRule (requires the Prometheus Operator CRD)
    enabled: false
    # -- additional labels for the PrometheusRule (e.g. to match your Prometheus ruleSelector)
    labels: {}
    # -- alerting/recording rules rendered under a single group
    rules: []
      # - alert: UnpollerTargetDown
      #   annotations:
      #     summary: unpoller metrics endpoint is down.
      #     description: Prometheus cannot scrape unpoller ({{ "{{ $labels.instance }}" }}).
      #   expr: up{job=~".*unpoller.*"} == 0
      #   for: 5m
      #   labels:
      #     severity: warning

# -- name of an existing secret providing the sensitive env vars below (e.g. `UP_UNIFI_CONTROLLER_0_PASS`); takes precedence over the chart-managed Secret rendered from `settings.unifi.auth`/`settings.influxdb.auth`
existingSecret: ""

## General configuration
## below show default values if specified
settings:
  ## Uses `_0_` number (ref: https://unpoller.com/docs/install/configuration - multiple controllers section)
  ## for additional controllers to scrape, use `extraEnv section` starting with `_1_`
  unifi:
    # -- non-sensitive UniFi controller connection settings, rendered as `UP_UNIFI_CONTROLLER_0_*` env vars (uppercased keys)
    config:
      # -- UniFi controller URL. Maps to UP_UNIFI_CONTROLLER_0_URL
      url: ""
      save_sites: true
      save_ids: false
      save_events: false
      save_alarms: false
      save_anomalies: false
      save_dpi: false
      # -- skip TLS certificate verification for the controller (set true for self-signed). Maps to UP_UNIFI_CONTROLLER_0_VERIFY_SSL
      verify_ssl: false
      # role: ""
      # api_key: ""  # required for Integration/v1 metrics on Network 9.3.43+ (unpoller v3+)
    ## if existingSecret is supplied, this section is ignored and must be provided in the existing secret
    ## rendered into the chart-managed Secret; env var keys are `UP_UNIFI_CONTROLLER_0_{USER/PASS}`
    auth:
      # -- UniFi controller username. For the self-hosted UniFi Network Application, this is the account's email. Maps to UP_UNIFI_CONTROLLER_0_USER
      user: ""
      # -- UniFi controller password. Maps to UP_UNIFI_CONTROLLER_0_PASS
      pass: ""
  ## influxdb configuration if applicable
  ## additional configuration for influxdb can be specified in `extraEnv`
  influxdb:
    # -- enable influxdb output (disables UP_INFLUXDB_DISABLE)
    enabled: false
    # -- non-sensitive influxdb connection settings, rendered as `UP_INFLUXDB_*` env vars (uppercased keys). Empty values are omitted so unpoller applies its own defaults (an empty UP_INFLUXDB_INTERVAL is an invalid duration and crashes unpoller).
    config:
      # -- influxdb URL. Maps to UP_INFLUXDB_URL
      url: ""
      # -- influxdb database name. Maps to UP_INFLUXDB_DB
      db: ""
      # -- influxdb write interval. Maps to UP_INFLUXDB_INTERVAL
      interval: ""
    ## Rendered into the chart-managed Secret only when `influxdb.enabled: true` (and no
    ## existingSecret). If existingSecret is supplied, this section is ignored and the keys
    ## must be provided in that secret. auth is v1/v2 exclusive: if `auth_token` is set the
    ## chart emits UP_INFLUXDB_AUTH_TOKEN (v2) and skips user/pass; otherwise it emits
    ## UP_INFLUXDB_USER/PASS (v1). This mirrors unpoller's own precedence (token wins).
    auth:
      # -- influxdb v1 username. Maps to UP_INFLUXDB_USER (used only when auth_token is empty)
      user: ""
      # -- influxdb v1 password. Maps to UP_INFLUXDB_PASS (used only when auth_token is empty)
      pass: ""
      # -- influxdb v2 auth token. Maps to UP_INFLUXDB_AUTH_TOKEN; when set, user/pass are omitted
      auth_token: ""
  ## additional configuration for prometheus can be specified in `extraEnv`
  prometheus:
    ## use below to disable prom metrics in unpoller
    # disable: false

    ## NOTE: by default the image is going to use the value of UP_PROMETHEUS_NAMESPACE ( not your actual deployed namespace) to prepend the metrics
    ## example: "{{ namespace }}_client_receive_bytes_total" => "unpoller_client_receive_bytes_total"
    ## Since the grafana charts (https://github.com/unpoller/dashboards) all have "unpoller" set in the prom queries, you should put this as "unpoller"
    ## TO work with the existing grafana dashboards unpoller provides, it is highly recommended to leave it as default: "unpoller"
    ## You can install this helm chart in any namespace you'd like though, just keep it the below var equal to "unpoller" for metrics
    # -- metric namespace prefix, keep as "unpoller" to work with upstream Grafana dashboards. Maps to UP_PROMETHEUS_NAMESPACE
    namespace: "unpoller"
    # -- address/port unpoller listens on for metrics. Maps to UP_PROMETHEUS_HTTP_LISTEN
    http_listen: "0.0.0.0:9130"

    ## Background poll interval for Prometheus metric collection (added in unpoller v3.2.0).
    ## unpoller pre-fetches UniFi data on this interval and serves /metrics from cache.
    ## Default "60s". Minimum effective value is 15s (values below are clamped by unpoller).
    ## The background cache cannot be disabled via this setting.
    ## Align your Prometheus scrape interval with this value to avoid stale data gaps.
    # -- background poll interval for metric collection. Maps to UP_PROMETHEUS_INTERVAL
    interval: "60s"

    ## additional settings
    # report_errors: false
    # buffer: "50"
  ## additional configuration for unpoller can be specified in `extraEnv`
  unpoller:
    # -- enable debug logging. Maps to UP_POLLER_DEBUG
    debug: false
    # -- suppress all but error logging. Maps to UP_POLLER_QUIET
    quiet: false

serviceAccount:
  # -- specifies whether a service account should be created
  create: false
  # -- automatically mount a ServiceAccount's API credentials
  automount: true
  # -- annotations to add to the service account
  annotations: {}
  # -- the name of the service account to use; if not set and create is true, a name is generated using the fullname template
  name: ""

## additional configuration for the above unifi config section can be specified with `_0_`
## for additional controllers to scrape, start with `_1_`
## all keys will be uppercased just in case
## Ref: https://unpoller.com/docs/install/dockercompose
## WARNING: values here render as plaintext env in the Deployment manifest. Use only for
## NON-sensitive vars. For secret values (e.g. controller 1+ passwords/api keys) use
## `extraEnvFrom` with a secretRef, or `existingSecret`, so they stay out of the pod spec.
# -- Add extra environment variables (plaintext; non-sensitive only)
extraEnv: {}

# -- extra `envFrom` sources (`secretRef`/`configMapRef`) merged into the container, in addition to the chart-managed or existing Secret.
extraEnvFrom: []
#  - secretRef:
#      name: unpoller-controller-1
#  - configMapRef:
#      name: unpoller-extra-config
  ## Some examples below
  # UP_UNIFI_DYNAMIC: false
  # UP_UNIFI_CONTROLLER_1_USER: ""
  ## optionally beloww could be supplied in `existingSecret` section
  # UP_UNIFI_CONTROLLER_1_PASS: ""
  # UP_UNIFI_CONTROLLER_1_SAVE_ALARMS: "true"
  # UP_UNIFI_CONTROLLER_1_SAVE_ANOMALIES: "true"
  # UP_UNIFI_CONTROLLER_1_SAVE_DPI: "true"
  # UP_UNIFI_CONTROLLER_1_SAVE_EVENTS: "true"
  # UP_UNIFI_CONTROLLER_1_SAVE_IDS: "true"
  # UP_UNIFI_CONTROLLER_1_SAVE_SITES: "true"
  ## change the below to your unifi instance
  # UP_UNIFI_CONTROLLER_1_URL: https://unifi.localdomain:8443
  ## api_key for Integration/v1 metrics (Network 9.3.43+, unpoller v3+)
  ## Prefer storing this in `existingSecret` as UP_UNIFI_CONTROLLER_0_API_KEY rather than plaintext here
  # UP_UNIFI_CONTROLLER_0_API_KEY: ""

## Liveness probe
## port: "prom" = .Values.service.port in the deployment file
## https://unpoller.com/docs/advanced/api  - health check endpoint
livenessProbe:
  httpGet:
    path: /health
    port: metrics
  initialDelaySeconds: 2
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 5
  successThreshold: 1

## Readiness probe
## port: "prom" = .Values.service.port in the deployment file
## https://unpoller.com/docs/advanced/api - health check endpoint
readinessProbe:
  httpGet:
    path: /health
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 5
  successThreshold: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

httproute:
  # -- enable a Gateway API (gateway.networking.k8s.io/v1) HTTPRoute as an alternative to ingress
  enabled: false
  # -- annotations added to the HTTPRoute
  annotations: {}
  # -- parentRefs pointing at the Gateway(s) to attach to; `name` is required
  parentRefs: []
  #  - name: traefik-gateway
  #    namespace: traefik
  #    sectionName: websecure
  # -- hostnames matched by the route
  hostnames: []
  #  - unpoller.example.org
  # -- explicit HTTPRoute rules; if empty, a single rule routing all paths to the Service is generated
  rules: []

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
