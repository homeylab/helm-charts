{{- if not .Values.config.existingConfigMap }}
{{- if .Values.config.run_schedule }}
{{- fail "config.run_schedule is not supported by this chart: a k8s CronJob pod runs once and exits, so upstream's app-native cron can never fire under CronJob mode (config.run_interval: 0), and it is redundant/inferior under Deployment mode (config.run_interval > 0), which loses Job history, concurrencyPolicy, and retries versus k8s scheduling. Use CronJob scheduling (config.run_interval: 0 + cron.schedule) or the in-pod interval loop (config.run_interval > 0) instead." }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bookstack-file-exporter.fullname" . }}
  labels:
    {{- include "bookstack-file-exporter.labels" . | nindent 4 }}
data:
  config.yml: |
    {{- include "bookstack-file-exporter.pruneMap" (omit .Values.config "existingConfigMap") | nindent 4 }}
{{- end }}
