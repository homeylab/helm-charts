# ct install permutation: default CronJob mode (config.run_interval: 0), inline token.
# Self-contained - no existingSecret, no object_storage. Reaches Ready under `ct install`.
config:
  host: "http://bookstack.bookstack.svc.cluster.local"
  credentials:
    token_id: "ci-token-id"
    token_secret: "ci-token-secret"
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi
