suite: bookstack-file-exporter secret
templates:
  - templates/secret.yaml
release:
  name: bookstack-file-exporter
tests:
  - it: does not render by default (no auth.* set)
    asserts:
      - hasDocuments: { count: 0 }
  - it: renders a chart-managed Secret with fixed token keys when auth.* is set
    set:
      auth.tokenId: my-id
      auth.tokenSecret: my-token-secret
    asserts:
      - hasDocuments: { count: 1 }
      - isKind: { of: Secret }
      - equal: { path: metadata.name, value: bookstack-file-exporter }
      - equal: { path: stringData.BOOKSTACK_TOKEN_ID, value: my-id }
      - equal: { path: stringData.BOOKSTACK_TOKEN_SECRET, value: my-token-secret }
  - it: renders when only one of the two auth fields is set
    set:
      auth.tokenId: my-id
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: stringData.BOOKSTACK_TOKEN_ID, value: my-id }
      - equal: { path: stringData.BOOKSTACK_TOKEN_SECRET, value: "" }
  - it: does not render the chart Secret when existingSecret.name is set (BYO Secret)
    set:
      auth.tokenId: my-id
      auth.tokenSecret: my-token-secret
      existingSecret.name: my-secret
    asserts:
      - hasDocuments: { count: 0 }
