apiVersion: v2
name: bookstack-file-exporter
description: A Helm chart to run scheduled exports/backups of a BookStack instance's pages, images, and attachments.
type: application

home: https://github.com/homeylab/helm-charts
sources:
  - https://github.com/homeylab/helm-charts
  - https://github.com/homeylab/bookstack-file-exporter
keywords:
  - bookstack
  - backup
  - export
  - wiki
  - documentation
maintainers:
  - name: homeylab
    url: https://github.com/homeylab

# This is the chart version. SemVer: https://semver.org/
version: 1.0.2

# Application version (upstream image tag). Not SemVer-bound.
# renovate: datasource=docker depName=homeylab/bookstack-file-exporter
appVersion: "3.0.0"

# Minimum supported Kubernetes version. The -0 suffix matches managed distros'
# prerelease-style versions (e.g. v1.28.3-gke.x).
# 1.21, not the fleet's 1.19: the default path renders a batch/v1 CronJob, which
# is only GA from 1.21 (batch/v1beta1 before that).
kubeVersion: ">=1.21.0-0"

annotations:
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/homeylab/helm-charts/tree/main/charts/bookstack-file-exporter
  artifacthub.io/changes: |
    - kind: added
      description: "declared a minimum supported Kubernetes version via kubeVersion (>=1.21.0-0, the floor for the batch/v1 CronJob this chart renders by default)"
