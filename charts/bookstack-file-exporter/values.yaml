# Default values for bookstack-file-exporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  # -- image registry
  registry: docker.io
  # -- image repository
  repository: homeylab/bookstack-file-exporter
  # -- image pull policy
  pullPolicy: IfNotPresent
  # -- overrides the image tag whose default is the chart appVersion
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # -- specifies whether a service account should be created
  create: true
  # -- automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- annotations to add to the service account
  annotations: {}
  # -- the name of the service account to use. If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  # -- fsGroup for the pod, matches the image's `exporter` GID
  fsGroup: 33333
  # -- runAsUser for the pod, matches the image's `exporter` UID
  runAsUser: 33333
  # -- runAsGroup for the pod, matches the image's `exporter` GID
  runAsGroup: 33333
  # -- require the pod to run as a non-root user
  runAsNonRoot: true

securityContext:
  capabilities:
    # -- drop all Linux capabilities
    drop:
      - ALL
  # -- disallow privilege escalation
  allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: true
  # -- left commented (disabled) by default: the exporter writes export archives to `/export/dump`; only enable if `persistence.enabled` is backed by a writable mount and no other writes are needed

# -- use an existing secret for credentials (e.g. BOOKSTACK_TOKEN_ID / BOOKSTACK_TOKEN_SECRET, object storage access/secret keys). See: https://github.com/homeylab/bookstack-file-exporter for the full list of supported env vars
existingSecret: ""
# -- additional `envFrom` sources (secretRef/configMapRef) for the container, e.g. a Secret you manage outside the chart such as one synced by External Secrets Operator (ESO). Standard k8s envFrom entries; combined with `existingSecret` if both are set
extraEnvFrom: []
# - secretRef:
#     name: bookstack-file-exporter-eso
# - configMapRef:
#     name: my-extra-env
# -- set extra environment variables
extraEnv: {}

## Keys inside `config:` are intentionally snake_case and map 1:1 to the upstream
## bookstack-file-exporter `config.yml`. This is a deliberate exception to the rest of this
## chart's camelCase convention (the same pattern the `grafana` chart uses for `grafana.ini`)
## so config keys never need hand-mapping and always match upstream docs verbatim. Any upstream
## config.yml key can be set here even if it is not listed below; unset/empty keys are pruned
## before rendering, since v3 rejects both unrecognized keys and explicit `null` values.
## Full key list and current defaults live upstream (this chart deliberately does not restate
## them, to avoid drifting out of sync):
## https://github.com/homeylab/bookstack-file-exporter/blob/main/docs/configuration.md
# -- exporter configuration, rendered into config.yml (snake_case, 1:1 with upstream; see notes above)
config:
  # -- use an existing ConfigMap for config.yml instead of the chart-rendered one (must contain a `config.yml` key). When set, the rest of the `config` block below is ignored and the chart's own ConfigMap is not rendered. Useful for GitOps-managed config or upstream keys not yet modeled by this chart
  existingConfigMap: ""
  # -- required: URL of the BookStack instance to export from
  host: "http://bookstack.bookstack.svc.cluster.local"
  credentials:
    # -- token id, rendered into config.yml (pruned when empty). The env var `BOOKSTACK_TOKEN_ID` (e.g. via `existingSecret`/`extraEnvFrom`) always overrides this at runtime, so leave it empty when using a Secret - setting it here as well would be both ignored AND written into the ConfigMap in cleartext
    token_id: ""
    # -- token secret, rendered into config.yml (pruned when empty). The env var `BOOKSTACK_TOKEN_SECRET` (e.g. via `existingSecret`/`extraEnvFrom`) always overrides this at runtime, so leave it empty when using a Secret - setting it here as well would be both ignored AND written into the ConfigMap in cleartext
    token_secret: ""
  # -- one or more export formats (markdown, html, pdf, plaintext, zip)
  formats:
    - markdown
  # -- how many backups to keep on the local filesystem; `-1` keeps all (requires at least one `object_storage` target). Upstream default is `0`; this chart defaults to `1` to preserve the previous chart's default behavior
  keep_last: 1
  # -- if `run_interval` is > `0`, the exporter runs as a Deployment and waits the given number of seconds between runs; `0` (default) uses a CronJob (see `cron.*`) instead. NOTE: upstream's app-native `run_schedule` is not supported by this chart (it cannot fire under CronJob mode, and is redundant under Deployment mode) and setting it will fail the render - use CronJob scheduling (`run_interval: 0` + `cron.schedule`) or this interval loop (`run_interval > 0`) instead
  run_interval: 0
  # -- optional health check server port; when set, the exporter binds a `/healthz` server and liveness/readiness probes are enabled in Deployment mode (`run_interval > 0`). Omitted from the rendered config (probes disabled) when empty. Maps to upstream `health_port`
  health_port: ""
  # -- optional health check server bind host; maps to upstream `health_host`. Omitted from the rendered config when empty
  health_host: ""
  # -- optional list of S3 / S3-compatible remote storage targets to also upload backups to; omitted from the rendered config when empty. AWS S3 is used when `endpoint` is unset, otherwise treated as S3-compatible
  object_storage: []
  # - name: primary
  #   endpoint: "s3.us-east-1.amazonaws.com" # leave unset to use AWS S3's default endpoint
  #   region: "us-east-1"
  #   bucket: "bookstack-bkps"
  #   prefix: "bookstack/file_backups/"
  #   secure: true
  #   verify_ssl: true
  #   keep_last: 5
  #   # prefer access_key_env/secret_key_env (paired with existingSecret) or ambient_auth over inline creds below
  #   access_key_env: "AWS_ACCESS_KEY_ID"
  #   secret_key_env: "AWS_SECRET_ACCESS_KEY"
  #   ambient_auth: false
  #   # access_key / secret_key: setting these inline renders the credentials into a ConfigMap in
  #   # cleartext (a ConfigMap is not a Secret). Prefer *_env + existingSecret, or ambient_auth, instead.
  #   # access_key: ""
  #   # secret_key: ""
  #
  # Advanced: any other upstream config.yml key passes through 1:1 (snake_case, pruned when unset).
  # The values below are illustrative only — upstream owns the current defaults (see link above),
  # so this chart does not model them as real values that could drift. Uncomment and tune as needed.
  # assets:
  #   export_images: true
  #   export_attachments: true
  #   modify_links: false          # rewrite image/attachment links to local relative paths
  #   export_meta: false
  # export_level: pages            # pages, books, or chapters
  # export_workers: 1
  # output_path: ""                # override the output dir inside the container
  # http_config:                   # ca_bundle is mutually exclusive with verify_ssl: false
  #   verify_ssl: true
  #   timeout: 30
  #   retry_count: 5
  #   retry_codes: [413, 429, 500, 502, 503, 504]
  #   backoff_factor: 2.5
  #   additional_headers:
  #     User-Agent: "bookstack-file-exporter"
  #   ca_bundle: ""
  # notifications: {}
  # filters: {}

cron:
  # -- applied when `config.run_interval == 0` (CronJob mode); set a valid cron schedule
  schedule: "@daily"
  # -- set a valid timezone if preferred
  timeZone: ""
  # -- set the concurrency policy
  concurrencyPolicy: Forbid
  # -- set restart policy
  restartPolicy: OnFailure

persistence:
  # -- enable persistence using a PVC for backup files
  enabled: false
  # -- set additional annotations for the PVC
  annotations: {}
  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  # -- set the storage class to use, example: `nfs-provisioner`
  storageClass: ""
  # -- set the size of the volume
  size: 5Gi
  # -- set an existingClaim for volume, if set the rest of persistence parameters are ignored
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  # probably will not have to change below
  # -- set the mount path for the volume inside the container
  mountPath: "/export/dump"
  # -- selector to match an existing Persistent Volume
  selector: {}

## for deployment
updateStrategy:
  # -- set the update strategy for the deployment
  type: Recreate

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- set additional volumes
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- set additional volumeMounts
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
