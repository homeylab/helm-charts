suite: tdarr-exporter API key Secret
templates:
  - templates/secret.yaml
release:
  name: tdarr-exporter
tests:
  - it: renders TDARR_API_KEY when apiKey is set and no existingSecret
    set:
      settings.config.apiKey: s3cret-key
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: stringData.TDARR_API_KEY, value: s3cret-key }
      - equal: { path: metadata.name, value: tdarr-exporter }
  - it: does not render when existingSecret.name is set, even if apiKey is also set
    set:
      settings.config.apiKey: s3cret-key
      settings.config.existingSecret.name: my-secret
      settings.config.existingSecret.secretKey: my-key
    asserts:
      - hasDocuments: { count: 0 }
  - it: does not render when neither apiKey nor existingSecret is set
    set:
      settings.config.apiKey: ""
      settings.config.existingSecret.name: ""
    asserts:
      - hasDocuments: { count: 0 }
