suite: exportarr per-instance apiKey Secret
templates:
  - templates/secret.yaml
release:
  name: ex
tests:
  - it: inline apiKey with no existingSecret renders a chart-managed Secret
    set:
      exportarr.apps.radarr[0]:
        name: main
        enabled: true
        url: http://radarr:7878
        apiKey: r-api-key-123
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: metadata.name, value: ex-exportarr-radarr-main }
      - equal: { path: stringData.API_KEY, value: r-api-key-123 }

  - it: existingSecret.name set skips the chart-managed Secret even when apiKey is also set
    set:
      exportarr.apps.radarr[0]:
        name: main
        enabled: true
        url: http://radarr:7878
        apiKey: r-api-key-123
        existingSecret:
          name: external-radarr-secret
          secretKey: radarr_api_key
    asserts:
      - hasDocuments: { count: 0 }

  - it: empty apiKey renders no chart-managed Secret
    set:
      exportarr.apps.radarr[0]:
        name: main
        enabled: true
        url: http://radarr:7878
    asserts:
      - hasDocuments: { count: 0 }
