suite: exportarr PrometheusRule
templates:
  - templates/prometheusrule.yaml
release:
  name: ex
tests:
  - it: does not render when disabled
    set:
      exportarr.metrics.prometheusRule.enabled: false
    asserts:
      - hasDocuments: { count: 0 }
  - it: omits groups entirely when enabled with no rules
    set:
      exportarr.metrics.prometheusRule.enabled: true
    asserts:
      - hasDocuments: { count: 1 }
      - notExists: { path: spec.groups }
  - it: renders one umbrella-wide PrometheusRule with the rule when enabled
    set:
      exportarr.metrics.prometheusRule.enabled: true
      exportarr.metrics.prometheusRule.rules:
        - alert: ExportarrTargetDown
          annotations:
            summary: exportarr metrics endpoint is down.
          expr: up{job=~".*exportarr.*"} == 0
          for: 5m
          labels:
            severity: warning
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: apiVersion, value: monitoring.coreos.com/v1 }
      - equal: { path: kind, value: PrometheusRule }
      # release name deliberately does not contain the chart name, so fullname
      # (metadata.name) and name (the group) render differently and cannot be swapped
      - equal: { path: metadata.name, value: ex-exportarr }
      - equal:
          path: spec.groups[0].name
          value: exportarr
      - equal:
          path: spec.groups[0].rules[0].alert
          value: ExportarrTargetDown
      - equal:
          path: spec.groups[0].rules[0].expr
          value: up{job=~".*exportarr.*"} == 0
  - it: merges custom labels into metadata labels
    set:
      exportarr.metrics.prometheusRule.enabled: true
      exportarr.metrics.prometheusRule.labels:
        release: kube-prometheus-stack
      exportarr.metrics.prometheusRule.rules:
        - alert: ExportarrTargetDown
          expr: up{job=~".*exportarr.*"} == 0
    asserts:
      - equal:
          path: metadata.labels.release
          value: kube-prometheus-stack
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: exportarr
