suite: exportarr helm test connection check
templates:
  - templates/tests/test-connection.yaml
release:
  name: ex
tests:
  - it: renders a test-connection pod per enabled instance by default
    set:
      exportarr.apps.radarr[0]:
        name: main
        enabled: true
        url: http://radarr:7878
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: kind, value: Pod }
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
      - equal:
          path: spec.containers[0].image
          value: "docker.io/busybox:1.36.1"
      - equal:
          path: spec.containers[0].imagePullPolicy
          value: IfNotPresent
      - equal:
          path: spec.containers[0].args[0]
          value: "ex-exportarr-radarr-main:9707/healthz"
  - it: renders nothing when tests.enabled is false
    set:
      exportarr.tests.enabled: false
      exportarr.apps.radarr[0]:
        name: main
        enabled: true
        url: http://radarr:7878
    asserts:
      - hasDocuments: { count: 0 }
  - it: honours overrides of the test image and path
    set:
      exportarr.tests.image.registry: ghcr.io
      exportarr.tests.image.repository: custom/wget
      exportarr.tests.image.tag: "2.0"
      exportarr.tests.image.pullPolicy: Always
      exportarr.tests.path: /metrics
      exportarr.apps.radarr[0]:
        name: main
        enabled: true
        url: http://radarr:7878
    asserts:
      - equal:
          path: spec.containers[0].image
          value: "ghcr.io/custom/wget:2.0"
      - equal:
          path: spec.containers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.containers[0].args[0]
          value: "ex-exportarr-radarr-main:9707/metrics"
