# ct install permutation: subchart passthrough (tdarr-exporter; qbittorrent-exporter
# temporarily off, see below). Exportarr's own arr instances stay disabled (defaults)
# to keep this install light — the point of this scenario is verifying dependency
# subcharts install cleanly as deps in a fresh namespace.
#
# tdarr-exporter reaches Ready without a reachable upstream: it uses httpGet /healthz
# on its own `metrics` port, independent of `config.url`.
qbittorrent-exporter:
  # Disabled until Chart.yaml pins qbittorrent-exporter >= 1.0.1.
  #
  # martabal's exporter returns 503 on every path until it can scrape a live qBittorrent,
  # so its `helm test` connection probe cannot pass in this backend-free namespace. The
  # `tests.enabled` gate that skips that probe was added in qbittorrent-exporter 1.0.1,
  # but this chart still pins 1.0.0 from OCI — and per CONTRIBUTING ("Umbrella charts:
  # release the subchart first") the pin can only move once 1.0.0's successor is published.
  # So the values below are inert against 1.0.0: the probe renders regardless and fails.
  #
  # Follow-up PR bumps the dependency to 1.0.1 and flips this back to `true`, at which
  # point `tests.enabled: false` takes effect and this scenario covers both subcharts again.
  enabled: false
  tests:
    enabled: false
  settings:
    config:
      baseUrl: "http://localhost:8080"
    auth:
      user: "ci-admin"
      pass: "ci-password"
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

tdarr-exporter:
  enabled: true
  settings:
    config:
      url: "http://localhost:8265"
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
