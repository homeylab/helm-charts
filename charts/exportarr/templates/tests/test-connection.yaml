{{- range $instance_key, $instance_val := .Values.exportarr.apps }}
{{- range $app := $instance_val }}
{{- if and $app.enabled $.Values.exportarr.tests.enabled }}
{{- $appName := printf "%s-%s-%s" (include "exportarr.fullname" $) $instance_key $app.name }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ $appName }}-test-connection"
  labels:
    {{- include "exportarr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $appName }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: "{{ $.Values.exportarr.tests.image.registry }}/{{ $.Values.exportarr.tests.image.repository }}:{{ $.Values.exportarr.tests.image.tag }}"
      imagePullPolicy: {{ $.Values.exportarr.tests.image.pullPolicy }}
      command: ['wget']
      args: ['{{ $appName }}:{{ $.Values.exportarr.service.port }}{{ $.Values.exportarr.tests.path }}']
  restartPolicy: Never
---
{{- end }}
{{- end }}
{{- end }}