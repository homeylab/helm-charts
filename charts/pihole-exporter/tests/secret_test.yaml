suite: pihole-exporter credential Secret
templates:
  - templates/secret.yaml
release:
  name: pihole-exporter
tests:
  - it: renders PIHOLE_PASSWORD from auth.password
    set:
      settings.auth.password: s3cret-pw
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: stringData.PIHOLE_PASSWORD, value: s3cret-pw }
      - equal: { path: metadata.name, value: pihole-exporter }
  - it: deprecated auth.token wins over auth.password
    set:
      settings.auth.password: from-pw
      settings.auth.token: from-token
    asserts:
      - equal: { path: stringData.PIHOLE_PASSWORD, value: from-token }
  - it: existingSecret skips the chart-managed Secret
    set:
      settings.auth.password: s3cret-pw
      settings.auth.existingSecret: my-secret
    asserts:
      - hasDocuments: { count: 0 }
  - it: no password and no existingSecret renders no Secret (no fail)
    set:
      settings.auth.password: ""
      settings.auth.token: ""
    asserts:
      - hasDocuments: { count: 0 }
