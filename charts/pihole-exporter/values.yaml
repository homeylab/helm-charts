# Default values for pihole-exporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
image:
  # -- image registry
  registry: docker.io
  # -- image repository
  repository: ekofr/pihole-exporter
  # -- image pull policy
  pullPolicy: IfNotPresent
  # -- overrides the image tag whose default is the chart appVersion
  tag: ""

## the `helm test` connection check, and the image it runs
tests:
  # -- run the `helm test` connection check (disable when there is no live Pi-hole to reach, e.g. in CI)
  enabled: true
  image:
    # -- registry for the `helm test` connection-check image
    registry: docker.io
    # -- repository for the `helm test` connection-check image
    repository: busybox
    # -- tag for the `helm test` connection-check image
    tag: "1.36.1"
    # -- pull policy for the `helm test` connection-check image
    pullPolicy: IfNotPresent
  ## path the test requests and expects a 200 from
  # -- path the `helm test` request calls and expects a 200 from
  path: /metrics

updateStrategy:
  # -- set the update strategy for the deployment
  type: Recreate

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

## each variable can be a list of values as documented by the upstream image
## "A single instance of pihole-exporter can monitor multiple pi-holes instances. To do so, you can specify a list of hostnames, protocols, passwords/API tokens and ports by separating them with commas in their respective environment variable"
## Example: hostname: "pihole1.example.com,pihole2.example.com"
## Ref: https://github.com/eko/pihole-exporter
settings:
  # -- Add Configuration as Environment Variables
  config:
    # -- Set the pihole host protocol: `http` or `https`, default `http` set by container image
    protocol: ""
    # -- Set the pihole host or IP address
    hostname: pi-hole.localdomain
    # -- Set the pihole port on the pihole host to use, default `80` set by container image
    port:
    # -- Set the port for metrics scraping
    containerPort: 9617
  # -- Set auth configuration for pihole.
  # As of pihole-exporter v1.x (Pi-hole v6 API) the exporter reads only `PIHOLE_PASSWORD`.
  # It accepts either the Pi-hole app password or the legacy WEBPASSWORD API token.
  auth:
    # -- Set the pihole app password (or legacy WEBPASSWORD API token) for auth. Maps to `PIHOLE_PASSWORD`.
    password: ""
    # -- DEPRECATED alias for `auth.password`, kept for backwards compatibility. If set, takes precedence over `auth.password`. Also maps to `PIHOLE_PASSWORD` (the separate `PIHOLE_API_TOKEN` env var was removed in upstream v1.x).
    token: ""
    # -- use existing secret instead of `auth.password`/`auth.token`. The secret must provide the `PIHOLE_PASSWORD` key (`PIHOLE_API_TOKEN` is no longer read by v1.x).
    existingSecret: ""

# -- Add extra environment variables
extraEnv: {}

service:
  type: ClusterIP
  # -- set port for pihole-exporter scraping, should match the pihole-exporter container port in `settings.config.containerPort`
  port: 9617
  # -- set name for the service
  name: metrics
  # -- set protocol for the service
  protocol: TCP

## set metrics export properties
metrics:
  # -- enable/disable prometheus podAnnotations and serviceMonitors.
  enabled: true
  # -- Add podAnnotations for prometheus scraping
  podAnnotations:
    prometheus.io/scrape: "true"
    # -- set the path for prometheus scraping
    prometheus.io/path: /metrics
    # -- set the port for prometheus scraping, should match the service port
    prometheus.io/port: "9617"
  ## if serviceMonitor enabled, pod annotations above will be ignored
  ## ServiceMonitor for each exportarr instance will be deployed instead
  serviceMonitor:
    # -- enable/disable serviceMonitor, if enabled podAnnotations will be ignored
    enabled: false
    # -- set the path for prometheus scraping for serviceMonitor
    path: /metrics
    # -- how often to scrape for serviceMonitor
    interval: 2m
    # -- scrapeTimeout for serviceMonitor
    scrapeTimeout: 15s
    # -- set additional labels for serviceMonitor
    additionalLabels: {}
    targetLabels: []
    # ref: https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/api.md#endpoint
    relabelings: []
    metricRelabelings: []
  ## Enable and configure Prometheus Rules for the chart under this key.
  prometheusRule:
    # -- enable a PrometheusRule (requires the Prometheus Operator CRD)
    enabled: false
    # -- additional labels for the PrometheusRule (e.g. to match your Prometheus ruleSelector)
    labels: {}
    # -- alerting/recording rules rendered under a single group
    rules: []
      # - alert: PiholeExporterTargetDown
      #   annotations:
      #     summary: pihole-exporter metrics endpoint is down.
      #     description: Prometheus cannot scrape pihole-exporter ({{ $labels.instance }}).
      #   expr: up{job=~".*pihole-exporter.*"} == 0
      #   for: 5m
      #   labels:
      #     severity: warning

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

httproute:
  # -- enable a Gateway API (gateway.networking.k8s.io/v1) HTTPRoute as an alternative to ingress
  enabled: false
  # -- annotations added to the HTTPRoute
  annotations: {}
  # -- parentRefs pointing at the Gateway(s) to attach to; `name` is required
  parentRefs: []
  #  - name: traefik-gateway
  #    namespace: traefik
  #    sectionName: websecure
  # -- hostnames matched by the route
  hostnames: []
  #  - pihole-exporter.example.org
  # -- explicit HTTPRoute rules; if empty, a single rule routing all paths to the Service is generated
  rules: []

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

## Liveness probe
livenessProbe:
  httpGet:
    path: /liveness
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 5
  successThreshold: 1

## Readiness probe
readinessProbe:
  httpGet:
    path: /readiness
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 5
  successThreshold: 1

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
