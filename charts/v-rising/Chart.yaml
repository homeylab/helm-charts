apiVersion: v2
name: v-rising
description: A Helm chart to deploy TrueOsiris/docker-vrising image for v-rising server
type: application

home: https://github.com/homeylab/helm-charts
sources:
  - https://github.com/homeylab/helm-charts
  - https://github.com/TrueOsiris/docker-vrising
keywords:
  - v-rising
  - vrising
  - game-server
  - gaming
  - dedicated-server
maintainers:
  - name: homeylab
    url: https://github.com/homeylab

# This is the chart version. SemVer: https://semver.org/
version: 1.0.2

# Application version (upstream image tag). Not SemVer-bound.
# renovate: datasource=docker depName=trueosiris/vrising versioning=regex:^(?<major>\d+)\.(?<minor>\d+)(\.(?<patch>\d+))?$
appVersion: "3.0"

# Minimum supported Kubernetes version. The -0 suffix matches managed distros'
# prerelease-style versions (e.g. v1.28.3-gke.x).
kubeVersion: ">=1.19.0-0"

annotations:
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/homeylab/helm-charts/tree/main/charts/v-rising
  artifacthub.io/changes: |
    - kind: added
      description: "declared a minimum supported Kubernetes version via kubeVersion (>=1.19.0-0)"
