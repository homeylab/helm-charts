# Default values for v-rising.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  # -- image registry
  registry: docker.io
  # -- image repository
  repository: trueosiris/vrising
  # -- image pull policy
  pullPolicy: IfNotPresent
  # -- overrides the image tag whose default is the chart appVersion
  tag: ""

# -- image pull secrets for the deployment
imagePullSecrets: []
# -- override the chart name
nameOverride: ""
# -- override the full release name
fullnameOverride: ""

serviceAccount:
  # -- specifies whether a service account should be created
  create: false
  # -- automatically mount a ServiceAccount's API credentials
  automount: true
  # -- annotations to add to the service account
  annotations: {}
  # -- the name of the service account to use; if not set and create is true, a name is generated using the fullname template
  name: ""

# -- deployment update strategy. `Recreate` terminates the old pod before creating the new one, avoiding a
# ReadWriteOnce PVC multi-attach deadlock on upgrade (the game server holds its steam/world RWO volumes).
# Override to `{type: RollingUpdate}` only if your persistence supports ReadWriteMany.
updateStrategy:
  type: Recreate

# -- extra pod annotations
podAnnotations: {}
# -- extra pod labels
podLabels: {}

# -- pod-level securityContext. Left empty ({}) by default so the chart works out of the box with
# the upstream image's steamcmd/wine boot, which write to /mnt. Adjust as needed for your environment.
podSecurityContext: {}
  # fsGroup: 2000

# -- container-level securityContext. Left empty ({}) by default, same as podSecurityContext above,
# to work with the steamcmd/wine boot. Adjust as needed for your environment.
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  ## Set service properties for the v-rising server
  server:
    # -- annotations added to the v-rising server service
    annotations: {}
    # -- set type of service, example: `ClusterIP`, `NodePort`, `LoadBalancer` for v-rising server
    type: ClusterIP
    gamePort:
      # -- set game port for v rising
      port: 9876
      # -- set the node port used if service.server.type is NodePort
      nodePort:
    queryPort:
      # -- set query port for v rising
      port: 9877
      # -- set the node port used if service.server.type is NodePort
      nodePort:
    # -- set the clusterIP of the service, useful when service.server.type is ClusterIP and a fixed IP is desired
    clusterIP:
    # -- set the loadBalancerIP if service.server.type is LoadBalancer
    loadBalancerIP:
    # -- restrict which client CIDRs may reach the service when service.server.type is LoadBalancer (empty allows all)
    loadBalancerSourceRanges: []
    # - 10.0.0.0/8
    # -- set the externalTrafficPolicy in the Service to either `Cluster` or `Local`
    externalTrafficPolicy: ""
    # -- manually set the external IPs for the service
    externalIPs: []
    # - XX.XX.XX.XX
  ## Add additional service for RCON
  rcon:
    # -- annotations added to the rcon service
    annotations: {}
    # -- optional enable rcon service port - note: also needs modification of settings file
    enabled: false
    # -- set type of service, example: `ClusterIP`, `NodePort`, `LoadBalancer` for rcon service
    type: ClusterIP
    # -- rcon port for v rising
    port: 25575
    # -- set the node port used if service.rcon.type is NodePort
    nodePort:
    # -- set the clusterIP of the service, useful when service.rcon.type is ClusterIP and a fixed IP is desired
    clusterIP:
    # -- set the loadBalancerIP if service.rcon.type is LoadBalancer
    loadBalancerIP:
    # -- restrict which client CIDRs may reach the service when service.rcon.type is LoadBalancer (empty allows all)
    loadBalancerSourceRanges: []
    # - 10.0.0.0/8
    # -- set the externalTrafficPolicy in the Service to either `Cluster` or `Local`
    externalTrafficPolicy: ""
    # -- manually set the external IPs for the service
    externalIPs: []
    # - XX.XX.XX.XX

config:
  # -- timezone for server
  tz: America/New_York
  # -- name of server
  serverName: "v-rising"
  # -- name of world
  worldName: "v-rising-world"
  # -- optional lifetime of logfiles
  logDays: 30
  # -- optionally pin the V Rising server version, e.g. `legacy-1.1.x-pc`; leave empty to auto-update to the latest build on boot. Unset/empty values in this block are omitted from the container env rather than rendered as an empty string
  branch: ""

# -- additional environment variables as key value pairs
extraEnv: {}

persistence:
  steamServer:
    # -- enable persistence using PVC for dedicated server files
    enabled: true
    # -- set additional annotations for the PVC
    annotations: {}
    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    ##
    # -- set the storage class to use
    storageClass: ""
    # -- set the size of the volume
    size: 10Gi
    # -- set an existingClaim for volume, if set the rest of persistence parameters are ignored
    existingClaim: ""
    # -- set the access modes for the volume
    accessModes:
      - ReadWriteOnce
    # -- set the mount path for the volume inside the container
    mountPath: "/mnt/vrising/server"
    # -- selector to match an existing Persistent Volume
    selector: {}
  world:
    # -- enable persistence using PVC for world files
    enabled: true
    # -- set additional annotations for the PVC
    annotations: {}
    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    ##
    # -- set the storage class to use
    storageClass: ""
    # -- set the size of the volume
    size: 5Gi
    # -- set an existingClaim for volume, if set the rest of persistence parameters are ignored
    existingClaim: ""
    # -- set the access modes for the volume
    accessModes:
      - ReadWriteOnce
    # -- set the mount path for the volume inside the container
    mountPath: "/mnt/vrising/persistentdata"
    # -- selector to match an existing Persistent Volume
    selector: {}

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  requests:
    # -- CPU request for the server container
    cpu: 500m
    # -- memory request for the server container; the game server is memory-hungry, keep this generous
    memory: 6G

## Not yet implemented by the upstream image (no HTTP endpoint to probe)
# -- liveness probe for the server container; not yet implemented upstream
livenessProbe: {}
  # httpGet:
  #   path: /
  #   port: http
# -- readiness probe for the server container; not yet implemented upstream
readinessProbe: {}
  # httpGet:
  #   path: /
  #   port: http

# -- additional volumes on the output Deployment definition
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- additional volumeMounts on the output Deployment definition
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# -- node labels for pod assignment
nodeSelector: {}

# -- tolerations for pod assignment
tolerations: []

# -- affinity rules for pod assignment
affinity: {}
