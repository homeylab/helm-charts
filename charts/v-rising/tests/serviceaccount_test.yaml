suite: v-rising ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: v-rising
tests:
  - it: does not render when serviceAccount.create is false (default)
    asserts:
      - hasDocuments: { count: 0 }
  - it: renders when serviceAccount.create is true
    set:
      serviceAccount.create: true
    asserts:
      - hasDocuments: { count: 1 }
      - equal: { path: metadata.name, value: v-rising }
  - it: uses serviceAccount.name override when set
    set:
      serviceAccount.create: true
      serviceAccount.name: custom-sa
    asserts:
      - equal: { path: metadata.name, value: custom-sa }
